# =============================================================================
# stilltent — Docker Compose (Phase 1–6: TiDB + mnemo-server + OpenClaw + Orchestrator)
#
# Usage:
#   cp .env.example .env   # fill in your values
#   make up                # starts the stack
#   make health            # verify everything is running
#
# Later phases will add the orchestrator.
# =============================================================================

# --------------------------------------------------------------------------
# Network: all services communicate over this internal bridge network.
# --------------------------------------------------------------------------
networks:
  stilltent-net:
    driver: bridge

# --------------------------------------------------------------------------
# Volumes: persistent storage for TiDB data across container restarts.
# --------------------------------------------------------------------------
volumes:
  tidb-data:

# --------------------------------------------------------------------------
# Services
# --------------------------------------------------------------------------
services:

  # ==========================================================================
  # TiDB — MySQL-compatible distributed database used by mnemo-server
  # for persistent memory storage (vector + relational).
  # ==========================================================================
  tidb:
    image: pingcap/tidb:v8.4.0
    container_name: stilltent-tidb
    ports:
      # Bind to localhost only — prevents exposure on LAN/public interfaces.
      # Connect with: mysql -h 127.0.0.1 -P 4000 -u root
      # NOTE: Requires mysql-client@8.4 (MySQL 9.x removed mysql_native_password)
      #   brew install mysql-client@8.4
      #   echo 'export PATH="/opt/homebrew/opt/mysql-client@8.4/bin:$PATH"' >> ~/.zshrc
      - "127.0.0.1:4000:4000"
    volumes:
      - tidb-data:/tmp/tidb
    networks:
      - stilltent-net
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/4000'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ==========================================================================
  # mnemo-server (mem9) — memory API that stores and retrieves memories
  # using TiDB for persistence and Ollama for embedding generation.
  #
  # Build from source: clone the mem9 repo into ./mnemo-server/
  # then run `make up`.
  # ==========================================================================
  mnemo-server:
    build:
      context: ./mnemo-server/server
      dockerfile: Dockerfile
    container_name: stilltent-mnemo
    depends_on:
      tidb:
        condition: service_healthy
    ports:
      # Expose the mem9 API on localhost only. Adjust MEM9_API_PORT in .env if needed.
      - "127.0.0.1:${MEM9_API_PORT:-8082}:8082"
    environment:
      # --- Database connection (Go MySQL DSN pointing at the TiDB container) ---
      MNEMO_DSN: "${TIDB_USER:-root}:${TIDB_PASSWORD:-}@tcp(${TIDB_HOST:-tidb}:${TIDB_PORT:-4000})/${TIDB_DATABASE:-mnemos}?parseTime=true"

      # --- Embedding provider (Ollama running on the host) ---
      MNEMO_EMBED_BASE_URL: "http://${OLLAMA_HOST:-host.docker.internal}:${OLLAMA_PORT:-11434}/v1"
      MNEMO_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}

      # --- Disable TiDB Cloud/Zero provisioning (local TiDB) ---
      MNEMO_TIDB_ZERO_ENABLED: "false"

      # --- Vector dimensions (must match embedding model output) ---
      # nomic-embed-text = 768 dims
      MNEMO_EMBED_DIMS: 768

      # --- Server port inside the container ---
      MNEMO_PORT: 8082
    networks:
      - stilltent-net
    restart: unless-stopped

  # ==========================================================================
  # OpenClaw Gateway — agent runtime that manages sessions, routes messages
  # to the LLM provider (Ollama), and executes tools (shell, file I/O, mem9).
  #
  # The gateway binds to 0.0.0.0 ("lan" mode) inside the container so Docker
  # port-mapping works. Auth is enforced via OPENCLAW_GATEWAY_TOKEN.
  #
  # Config:  ./config/openclaw/  → /home/node/.openclaw  (openclaw.json, .env)
  # Workspace: ./workspace/      → /workspace            (agent working dir)
  #
  # Published image: ghcr.io/openclaw/openclaw (bookworm + bookworm-slim)
  # Docs: https://docs.openclaw.ai/install/docker
  # ==========================================================================
  openclaw-gateway:
    build:
      context: .
      dockerfile: dockerfiles/openclaw.Dockerfile
    image: stilltent/openclaw:latest
    container_name: stilltent-openclaw
    depends_on:
      mnemo-server:
        condition: service_started
      tidb:
        condition: service_healthy
    ports:
      # Gateway HTTP/WS port. Bound to localhost only for security.
      - "127.0.0.1:${OPENCLAW_PORT:-18789}:18789"
    volumes:
      # OpenClaw reads config from ~/.openclaw inside the container.
      # The container runs as user "node" (uid 1000), so HOME=/home/node.
      - ./config/openclaw:/home/node/.openclaw:rw
      # Agent workspace — where the agent clones repos, edits files, etc.
      - ./workspace:/workspace:rw
    environment:
      # --- Gateway auth ---
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}

      # --- GitHub access for agent tools ---
      GITHUB_TOKEN: ${GITHUB_TOKEN}

      # --- Ollama provider (running on the host) ---
      # OpenClaw's bundled Ollama extension reads OLLAMA_API_KEY to enable
      # auto-discovery of models via the Ollama /api/tags endpoint.
      OLLAMA_API_KEY: ${OLLAMA_API_KEY:-ollama-local}
      OLLAMA_BASE_URL: http://${OLLAMA_HOST:-host.docker.internal}:${OLLAMA_PORT:-11434}

      # --- mem9 memory API (mnemo-server container) ---
      MEM9_API_URL: http://mnemo-server:${MEM9_API_PORT:-8082}
      MEM9_API_KEY: ${MEM9_API_KEY:-stilltent-local-dev-key}

      # --- Target repo for the agent to work on ---
      TARGET_REPO: ${TARGET_REPO}

      # --- Misc ---
      HOME: /home/node
      TERM: xterm-256color
    networks:
      - stilltent-net
    extra_hosts:
      # Allows containers on Linux to reach the host's Ollama instance
      # via http://host.docker.internal:11434. No-op on Docker Desktop.
      - "host.docker.internal:host-gateway"
    init: true
    # Wait for Ollama on the host to be reachable before starting the gateway,
    # so model auto-discovery succeeds on first boot.
    command:
      - /bin/sh
      - -c
      - |
        until node -e "fetch('http://host.docker.internal:${OLLAMA_PORT:-11434}/api/tags').then(r=>{if(!r.ok)throw 1}).catch(()=>process.exit(1))" 2>/dev/null; do
          echo "Waiting for Ollama on host..."
          sleep 2
        done
        echo "Ollama is reachable, starting gateway..."
        exec node openclaw.mjs gateway --allow-unconfigured --bind lan --port 18789
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ==========================================================================
  # Orchestrator — lightweight loop driver that triggers the OpenClaw agent
  # on a configurable interval. It does NOT make decisions — the agent (via
  # SKILL.md) makes all decisions. The orchestrator just sends the prompt,
  # monitors for hangs, collects metrics, and enforces the time budget.
  # ==========================================================================
  orchestrator:
    build:
      context: ./orchestrator
      dockerfile: Dockerfile
    container_name: stilltent-orchestrator
    depends_on:
      openclaw-gateway:
        condition: service_healthy
    environment:
      OPENCLAW_URL: http://openclaw-gateway:18789
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      TARGET_REPO: ${TARGET_REPO}
      LOOP_INTERVAL: ${LOOP_INTERVAL:-60}
      ITERATION_TIMEOUT: ${ITERATION_TIMEOUT:-600}
      MAX_CONSECUTIVE_FAILURES: ${MAX_CONSECUTIVE_FAILURES:-10}
      WORKSPACE_DIR: /workspace
    volumes:
      - ./workspace:/workspace:rw
    networks:
      - stilltent-net
    restart: unless-stopped
