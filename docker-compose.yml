networks:
  stilltent-net:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: '1500'
volumes:
  tidb-data: null
services:
  tidb:
    image: pingcap/tidb:v8.4.0
    container_name: stilltent-tidb
    volumes:
    - tidb-data:/tmp/tidb
    ports:
    - 4000:4000
    - 10080:10080
    networks:
    - stilltent-net
    environment:
      TIDB_CONFIG: '[performance]

        max-memory = 2147483648

        '
    healthcheck:
      test:
      - CMD-SHELL
      - curl -sf http://127.0.0.1:10080/status
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2.5G
          cpus: '1.5'
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
    restart: unless-stopped
  embed-service:
    build:
      context: ./memory/mem9/embed-service
      dockerfile: Dockerfile
    container_name: stilltent-embed
    read_only: true
    tmpfs:
    - /tmp:size=10m
    environment:
      EMBED_PORT: '8090'
      EMBED_DIMS: '256'
      EMBED_THREADS: '2'
    ports:
    - 8090:8090
    networks:
      stilltent-net:
        aliases:
        - embed
    healthcheck:
      test:
      - CMD-SHELL
      - wget -qO- http://127.0.0.1:8090/health || exit 1
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 10
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
    restart: unless-stopped
  mnemo-server:
    build:
      context: ./memory/mem9/mnemo-server/server
      dockerfile: Dockerfile
    container_name: stilltent-mnemo
    depends_on:
      tidb:
        condition: service_healthy
      embed-service:
        condition: service_healthy
    environment:
      MNEMO_DSN: ${TIDB_USER:-root}:${TIDB_PASSWORD:-}@tcp(${TIDB_HOST:-tidb}:${TIDB_PORT:-4000})/${TIDB_DATABASE:-mnemos}?parseTime=true
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-ollama}
      MNEMO_EMBED_BASE_URL: http://embed-service:8090/v1
      MNEMO_EMBED_API_KEY: local
      MNEMO_EMBED_MODEL: ${EMBEDDING_MODEL:-local-embed}
      MNEMO_TIDB_ZERO_ENABLED: 'false'
      MNEMO_EMBED_DIMS: ${EMBEDDING_DIM:-256}
      MNEMO_PORT: 8082
    ports:
    - 8082:8082
    networks:
    - stilltent-net
    healthcheck:
      test:
      - CMD-SHELL
      - wget -qO- http://127.0.0.1:8082/health || exit 1
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
    restart: unless-stopped
  openclaw-gateway:
    build:
      context: .
      dockerfile: dockerfiles/openclaw.Dockerfile
    image: stilltent/openclaw:latest
    container_name: stilltent-openclaw
    depends_on:
      mnemo-server:
        condition: service_healthy
      tidb:
        condition: service_healthy
    ports:
    - ${OPENCLAW_PORT:-18789}:18789
    volumes:
    - ./config/openclaw:/home/node/.openclaw:rw
    - ./config/openclaw/.gitconfig:/root/.gitconfig:ro
    - ./workspace:/workspace:rw
    environment:
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-qwen/qwen3-coder-next}
      MEM9_API_URL: ${AGENT_MEMORY_URL:-http://mnemo-server:8082}
      MEM9_API_KEY: ${MEM9_API_KEY:-stilltent-local-dev-key}
      TARGET_REPO: ${TARGET_REPO}
      HOME: /home/node
      TERM: xterm-256color
    networks:
    - stilltent-net
    init: true
    command:
    - /bin/sh
    - -c
    - "# --- Phase 1: Permission setup (runs as root from Dockerfile) ---\nchmod 777\
      \ /workspace 2>/dev/null || true\nmkdir -p /workspace/repo\nchown -R 1000:1000\
      \ /workspace/repo 2>/dev/null || chmod -R a+rwX /workspace/repo 2>/dev/null\
      \ || true\n\n# --- Phase 2: Build runtime config ---\nmkdir -p /tmp/openclaw-home/.openclaw\n\
      sed \"s|__OPENROUTER_API_KEY__|$${OPENROUTER_API_KEY}|g\" \\\n  /home/node/.openclaw/openclaw.json\
      \ > /tmp/openclaw-home/.openclaw/openclaw.json\nif [ ! -s /tmp/openclaw-home/.openclaw/openclaw.json\
      \ ]; then\n  echo \"WARNING: config substitution failed, copying config as-is\"\
      \n  cp /home/node/.openclaw/openclaw.json /tmp/openclaw-home/.openclaw/openclaw.json\n\
      fi\nln -sfn /home/node/.openclaw/extensions /tmp/openclaw-home/.openclaw/extensions\n\
      cp /home/node/.gitconfig /tmp/openclaw-home/.gitconfig 2>/dev/null || true\n\
      chown -R 1000:1000 /tmp/openclaw-home\n\n# --- Phase 3: Drop to node user and\
      \ start gateway ---\nexec gosu node sh -c '\n  export HOME=/tmp/openclaw-home\n\
      \  git config --global url.\"https://x-access-token:'\"$${GITHUB_TOKEN}\"'@github.com/\"\
      .insteadOf \"https://github.com/\"\n  echo \"Starting gateway...\"\n  exec node\
      \ /app/openclaw.mjs gateway --allow-unconfigured --bind lan --port 18789\n'\n"
    healthcheck:
      test:
      - CMD
      - node
      - -e
      - fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))
      interval: 60s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 1.5G
          cpus: '1.5'
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
    restart: unless-stopped
  orchestrator:
    build:
      context: ./core/orchestrator
      dockerfile: Dockerfile
    container_name: stilltent-orchestrator
    environment:
      AGENT_URL: ${AGENT_URL:-http://openclaw-gateway:18789}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      TARGET_REPO: ${TARGET_REPO}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-qwen/qwen3-coder-next}
      LOOP_INTERVAL: ${LOOP_INTERVAL:-60}
      COOLDOWN_SECONDS: ${COOLDOWN_SECONDS:-30}
      ITERATION_TIMEOUT: ${ITERATION_TIMEOUT:-600}
      MAX_CONSECUTIVE_FAILURES: ${MAX_CONSECUTIVE_FAILURES:-25}
      TOTAL_RUNTIME_HOURS: ${TOTAL_RUNTIME_HOURS:-120}
      BUDGET_LIMIT: ${BUDGET_LIMIT:-50}
      DAILY_BUDGET_LIMIT: ${DAILY_BUDGET_LIMIT:-15}
      MAX_ITERATIONS: ${MAX_ITERATIONS:-0}
      WORKSPACE_DIR: /workspace
      OPENCLAW_URL: ${OPENCLAW_URL:-http://openclaw-gateway:18789}
    volumes:
    - ./workspace:/workspace:rw
    networks:
    - stilltent-net
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
    restart: unless-stopped
    depends_on:
      openclaw-gateway:
        condition: service_healthy
