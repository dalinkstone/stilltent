# =============================================================================
# repokeeper — Docker Compose (Phase 1: TiDB + mnemo-server)
#
# Usage:
#   cp .env.example .env   # fill in your values
#   make up                # starts the stack
#   make health            # verify everything is running
#
# Later phases will add OpenClaw gateway and the orchestrator.
# =============================================================================

# --------------------------------------------------------------------------
# Network: all services communicate over this internal bridge network.
# --------------------------------------------------------------------------
networks:
  repokeeper-net:
    driver: bridge

# --------------------------------------------------------------------------
# Volumes: persistent storage for TiDB data across container restarts.
# --------------------------------------------------------------------------
volumes:
  tidb-data:

# --------------------------------------------------------------------------
# Services
# --------------------------------------------------------------------------
services:

  # ==========================================================================
  # TiDB — MySQL-compatible distributed database used by mnemo-server
  # for persistent memory storage (vector + relational).
  # ==========================================================================
  tidb:
    image: pingcap/tidb:latest
    container_name: repokeeper-tidb
    ports:
      # TODO: Remove this host binding after initial setup/debugging.
      # Only needed so you can connect with: mysql -h 127.0.0.1 -P 4000 -u root
      # NOTE: Requires mysql-client@8.4 (MySQL 9.x removed mysql_native_password)
      #   brew install mysql-client@8.4
      #   echo 'export PATH="/opt/homebrew/opt/mysql-client@8.4/bin:$PATH"' >> ~/.zshrc
      - "4000:4000"
    volumes:
      - tidb-data:/tmp/tidb
    networks:
      - repokeeper-net
    healthcheck:
      # Try mysqladmin first; fall back to netcat if the image lacks it.
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -P 4000 --silent || nc -z 127.0.0.1 4000"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ==========================================================================
  # mnemo-server (mem9) — memory API that stores and retrieves memories
  # using TiDB for persistence and Ollama for embedding generation.
  #
  # Build from source: clone the mem9 repo into ./mnemo-server/
  # then run `make up`.
  # ==========================================================================
  mnemo-server:
    build:
      context: ./mnemo-server/server
      dockerfile: Dockerfile
    container_name: repokeeper-mnemo
    depends_on:
      tidb:
        condition: service_healthy
    ports:
      # Expose the mem9 API on the host. Adjust MEM9_API_PORT in .env if needed.
      - "${MEM9_API_PORT:-8082}:8082"
    environment:
      # --- Database connection (points at the TiDB container) ---
      TIDB_HOST: ${TIDB_HOST:-tidb}
      TIDB_PORT: ${TIDB_PORT:-4000}
      TIDB_USER: ${TIDB_USER:-root}
      TIDB_PASSWORD: ${TIDB_PASSWORD:-}
      TIDB_DATABASE: ${TIDB_DATABASE:-mnemos}

      # --- Embedding provider (Ollama running on the host) ---
      EMBED_PROVIDER: ollama
      EMBED_BASE_URL: "http://${OLLAMA_HOST:-host.docker.internal}:${OLLAMA_PORT:-11434}"
      EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}

      # --- API authentication ---
      API_KEY: ${MEM9_API_KEY:-repokeeper-local-dev-key}

      # --- Server port inside the container ---
      PORT: 8082
    networks:
      - repokeeper-net
    restart: unless-stopped
