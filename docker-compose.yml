# =============================================================================
# stilltent — Docker Compose (Phase 1–6: TiDB + mnemo-server + OpenClaw + Orchestrator)
#
# Usage:
#   cp .env.example .env   # fill in your values
#   make up                # starts the stack
#   make health            # verify everything is running
#
# =============================================================================

# --------------------------------------------------------------------------
# Network: all services communicate over this internal bridge network.
# --------------------------------------------------------------------------
networks:
  stilltent-net:
    driver: bridge

# --------------------------------------------------------------------------
# Volumes: persistent storage for TiDB data across container restarts.
# --------------------------------------------------------------------------
volumes:
  tidb-data:

# --------------------------------------------------------------------------
# Services
# --------------------------------------------------------------------------
services:

  # ==========================================================================
  # TiDB — MySQL-compatible distributed database used by mnemo-server
  # for persistent memory storage (vector + relational).
  # ==========================================================================
  tidb:
    image: pingcap/tidb:v8.4.0
    container_name: stilltent-tidb
    volumes:
      - tidb-data:/tmp/tidb
    ports:
      - "4000:4000"
    networks:
      - stilltent-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:10080/status"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ==========================================================================
  # mnemo-server (mem9) — memory API that stores and retrieves memories
  # using TiDB for persistence and OpenRouter for embedding generation.
  #
  # Build from source: clone the mem9 repo into ./mnemo-server/
  # then run `make up`.
  # ==========================================================================
  mnemo-server:
    build:
      context: ./mnemo-server/server
      dockerfile: Dockerfile
    container_name: stilltent-mnemo
    depends_on:
      tidb:
        condition: service_healthy
    environment:
      # --- Database connection (Go MySQL DSN pointing at the TiDB container) ---
      MNEMO_DSN: "${TIDB_USER:-root}:${TIDB_PASSWORD:-}@tcp(${TIDB_HOST:-tidb}:${TIDB_PORT:-4000})/${TIDB_DATABASE:-mnemos}?parseTime=true"

      # --- Embedding provider (OpenRouter) ---
      EMBEDDING_PROVIDER: openrouter
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-openai/text-embedding-3-small}

      # --- Disable TiDB Cloud/Zero provisioning (local TiDB) ---
      MNEMO_TIDB_ZERO_ENABLED: "false"

      # --- Vector dimensions (must match embedding model output) ---
      # text-embedding-3-small = 1536 dims
      MNEMO_EMBED_DIMS: 1536

      # --- Server port inside the container ---
      MNEMO_PORT: 8082
    networks:
      - stilltent-net
    restart: unless-stopped

  # ==========================================================================
  # OpenClaw Gateway — agent runtime that manages sessions, routes messages
  # to the LLM provider (OpenRouter), and executes tools (shell, file I/O, mem9).
  #
  # The gateway binds to 0.0.0.0 ("lan" mode) inside the container so Docker
  # port-mapping works. Auth is enforced via OPENCLAW_GATEWAY_TOKEN.
  #
  # Config:  ./config/openclaw/  → /home/node/.openclaw  (openclaw.json, .env)
  # Workspace: ./workspace/      → /workspace            (agent working dir)
  #
  # Published image: ghcr.io/openclaw/openclaw (bookworm + bookworm-slim)
  # Docs: https://docs.openclaw.ai/install/docker
  # ==========================================================================
  openclaw-gateway:
    build:
      context: .
      dockerfile: dockerfiles/openclaw.Dockerfile
    image: stilltent/openclaw:latest
    container_name: stilltent-openclaw
    depends_on:
      mnemo-server:
        condition: service_started
      tidb:
        condition: service_healthy
    volumes:
      # OpenClaw reads config from ~/.openclaw inside the container.
      # The container runs as user "node" (uid 1000), so HOME=/home/node.
      - ./config/openclaw:/home/node/.openclaw:rw
      # Persistent git identity for the agent (survives container restarts).
      - ./config/openclaw/.gitconfig:/root/.gitconfig:ro
      # Agent workspace — where the agent clones repos, edits files, etc.
      - ./workspace:/workspace:rw
    environment:
      # --- Gateway auth ---
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}

      # --- GitHub access for agent tools ---
      GITHUB_TOKEN: ${GITHUB_TOKEN}

      # --- OpenRouter LLM provider ---
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-deepseek/deepseek-chat-v3-0324}

      # --- mem9 memory API (mnemo-server container) ---
      MEM9_API_URL: http://mnemo-server:${MEM9_API_PORT:-8082}
      MEM9_API_KEY: ${MEM9_API_KEY:-stilltent-local-dev-key}

      # --- Target repo for the agent to work on ---
      TARGET_REPO: ${TARGET_REPO}

      # --- Misc ---
      HOME: /home/node
      TERM: xterm-256color
    networks:
      - stilltent-net
    init: true
    command:
      - /bin/sh
      - -c
      - |
        # Build runtime config with actual API key (avoids leaking key into mounted host file)
        mkdir -p /tmp/openclaw-home/.openclaw
        sed "s/__OPENROUTER_API_KEY__/$${OPENROUTER_API_KEY}/g" \
          /home/node/.openclaw/openclaw.json > /tmp/openclaw-home/.openclaw/openclaw.json
        # Link extensions directory so plugins are discoverable at runtime HOME
        ln -sfn /home/node/.openclaw/extensions /tmp/openclaw-home/.openclaw/extensions
        # Carry over git identity from the image
        cp /home/node/.gitconfig /tmp/openclaw-home/.gitconfig 2>/dev/null || true
        export HOME=/tmp/openclaw-home
        # Configure git to authenticate via GITHUB_TOKEN (same approach as GitHub Actions)
        git config --global url."https://x-access-token:$${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"
        echo "Starting gateway..."
        exec node /app/openclaw.mjs gateway --allow-unconfigured --bind lan --port 18789
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ==========================================================================
  # Orchestrator — lightweight loop driver that triggers the OpenClaw agent
  # on a configurable interval. It does NOT make decisions — the agent (via
  # SKILL.md) makes all decisions. The orchestrator just sends the prompt,
  # monitors for hangs, collects metrics, and enforces the time budget.
  # ==========================================================================
  orchestrator:
    build:
      context: ./orchestrator
      dockerfile: Dockerfile
    container_name: stilltent-orchestrator
    depends_on:
      openclaw-gateway:
        condition: service_healthy
    environment:
      OPENCLAW_URL: http://openclaw-gateway:18789
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      TARGET_REPO: ${TARGET_REPO}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-deepseek/deepseek-chat-v3-0324}
      LOOP_INTERVAL: ${LOOP_INTERVAL:-60}
      ITERATION_TIMEOUT: ${ITERATION_TIMEOUT:-600}
      MAX_CONSECUTIVE_FAILURES: ${MAX_CONSECUTIVE_FAILURES:-10}
      WORKSPACE_DIR: /workspace
    volumes:
      - ./workspace:/workspace:rw
    networks:
      - stilltent-net
    restart: unless-stopped
