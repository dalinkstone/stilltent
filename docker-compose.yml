# =============================================================================
# stilltent — Docker Compose (Phase 1–6: TiDB + mnemo-server + OpenClaw + Orchestrator)
#
# Target: DigitalOcean 8GB RAM / 2 Intel vCPU / 160GB disk ($48/mo)
# Memory budget: ~4.8G containers + ~3.2G OS/Docker/buffers/cache
#
# Usage:
#   cp .env.example .env   # fill in your values
#   make up                # starts the stack
#   make health            # verify everything is running
#
# Recommended: configure 4G swap on the droplet
# sudo fallocate -l 4G /swapfile && sudo chmod 600 /swapfile
# sudo mkswap /swapfile && sudo swapon /swapfile
# echo '/swapfile none swap sw 0 0' | sudo tee -a /etc/fstab
#
# =============================================================================

# --------------------------------------------------------------------------
# Network: all services communicate over this internal bridge network.
# --------------------------------------------------------------------------
networks:
  stilltent-net:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: "1500"

# --------------------------------------------------------------------------
# Volumes: persistent storage for TiDB data across container restarts.
# --------------------------------------------------------------------------
volumes:
  tidb-data:

# --------------------------------------------------------------------------
# Services
# --------------------------------------------------------------------------
services:

  # ==========================================================================
  # TiDB — MySQL-compatible distributed database used by mnemo-server
  # for persistent memory storage (vector + relational).
  # ==========================================================================
  tidb:
    image: pingcap/tidb:v8.4.0
    container_name: stilltent-tidb
    volumes:
      - tidb-data:/tmp/tidb
    ports:
      - "4000:4000"
      - "10080:10080"
    networks:
      - stilltent-net
    environment:
      # Limit TiDB server memory to 2GB to stay within container budget
      TIDB_CONFIG: |
        [performance]
        max-memory = 2147483648
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:10080/status"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2.5G
          cpus: "1.5"
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  # ==========================================================================
  # embed-service — local C-based embedding service (no external API cost).
  # Produces 256-dim L2-normalized vectors via OpenAI-compatible API.
  # ==========================================================================
  embed-service:
    build:
      context: ./embed-service
      dockerfile: Dockerfile
    container_name: stilltent-embed
    read_only: true
    environment:
      EMBED_PORT: "8090"
      EMBED_DIMS: "256"
      # Reduced from 8 to 2 — matches 2 Intel vCPU droplet
      EMBED_THREADS: "2"
    ports:
      - "8090:8090"
    networks:
      stilltent-net:
        aliases:
          - embed
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8090/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  # ==========================================================================
  # mnemo-server (mem9) — memory API that stores and retrieves memories
  # using TiDB for persistence and local embed-service for embeddings.
  #
  # Build from source: clone the mem9 repo into ./mnemo-server/
  # then run `make up`.
  # ==========================================================================
  mnemo-server:
    build:
      context: ./mnemo-server/server
      dockerfile: Dockerfile
    container_name: stilltent-mnemo
    depends_on:
      tidb:
        condition: service_healthy
      embed-service:
        condition: service_healthy
    environment:
      # --- Database connection (Go MySQL DSN pointing at the TiDB container) ---
      MNEMO_DSN: "${TIDB_USER:-root}:${TIDB_PASSWORD:-}@tcp(${TIDB_HOST:-tidb}:${TIDB_PORT:-4000})/${TIDB_DATABASE:-mnemos}?parseTime=true"

      # --- Embedding provider (local C service, OpenAI-compatible API) ---
      # "ollama" is the mnemo-server code path for local/OpenAI-compatible embeds.
      # This does NOT require actual Ollama — it uses the embed-service container.
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-ollama}
      MNEMO_EMBED_BASE_URL: http://embed-service:8090/v1
      MNEMO_EMBED_API_KEY: local
      MNEMO_EMBED_MODEL: ${EMBEDDING_MODEL:-local-embed}

      # --- Disable TiDB Cloud/Zero provisioning (local TiDB) ---
      MNEMO_TIDB_ZERO_ENABLED: "false"

      # --- Vector dimensions (must match embed-service output: 256) ---
      MNEMO_EMBED_DIMS: ${EMBEDDING_DIM:-256}

      # --- Server port inside the container ---
      MNEMO_PORT: 8082
    ports:
      - "8082:8082"
    networks:
      - stilltent-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8082/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  # ==========================================================================
  # OpenClaw Gateway — agent runtime that manages sessions, routes messages
  # to the LLM provider (OpenRouter), and executes tools (shell, file I/O, mem9).
  #
  # The gateway binds to 0.0.0.0 ("lan" mode) inside the container so Docker
  # port-mapping works. Auth is enforced via OPENCLAW_GATEWAY_TOKEN.
  #
  # Config:  ./config/openclaw/  → /home/node/.openclaw  (openclaw.json, .env)
  # Workspace: ./workspace/      → /workspace            (agent working dir)
  #
  # Published image: ghcr.io/openclaw/openclaw (bookworm + bookworm-slim)
  # Docs: https://docs.openclaw.ai/install/docker
  # ==========================================================================
  openclaw-gateway:
    build:
      context: .
      dockerfile: dockerfiles/openclaw.Dockerfile
    image: stilltent/openclaw:latest
    container_name: stilltent-openclaw
    depends_on:
      mnemo-server:
        condition: service_healthy
      tidb:
        condition: service_healthy
    ports:
      - "${OPENCLAW_PORT:-18789}:18789"
    volumes:
      # OpenClaw reads config from ~/.openclaw inside the container.
      # The container runs as user "node" (uid 1000), so HOME=/home/node.
      - ./config/openclaw:/home/node/.openclaw:rw
      # Persistent git identity for the agent (survives container restarts).
      - ./config/openclaw/.gitconfig:/root/.gitconfig:ro
      # Agent workspace — where the agent clones repos, edits files, etc.
      - ./workspace:/workspace:rw
    environment:
      # --- Gateway auth ---
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}

      # --- GitHub access for agent tools ---
      GITHUB_TOKEN: ${GITHUB_TOKEN}

      # --- OpenRouter LLM provider ---
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-qwen/qwen3-coder-next}

      # --- mem9 memory API (mnemo-server container) ---
      MEM9_API_URL: http://mnemo-server:${MEM9_API_PORT:-8082}
      MEM9_API_KEY: ${MEM9_API_KEY:-stilltent-local-dev-key}

      # --- Target repo for the agent to work on ---
      TARGET_REPO: ${TARGET_REPO}

      # --- Misc ---
      HOME: /home/node
      TERM: xterm-256color
    networks:
      - stilltent-net
    init: true
    command:
      - /bin/sh
      - -c
      - |
        # --- Phase 1: Permission setup (runs as root from Dockerfile) ---
        # Make /workspace world-writable so both node (1000) and orchestrator can write
        chmod 777 /workspace 2>/dev/null || true
        mkdir -p /workspace/repo
        chown -R 1000:1000 /workspace/repo 2>/dev/null || chmod -R a+rwX /workspace/repo 2>/dev/null || true

        # --- Phase 2: Build runtime config ---
        mkdir -p /tmp/openclaw-home/.openclaw
        # Use | as sed delimiter (API keys may contain / or &)
        sed "s|__OPENROUTER_API_KEY__|$${OPENROUTER_API_KEY}|g" \
          /home/node/.openclaw/openclaw.json > /tmp/openclaw-home/.openclaw/openclaw.json
        # Fallback: if sed produced an empty file, copy the original
        if [ ! -s /tmp/openclaw-home/.openclaw/openclaw.json ]; then
          echo "WARNING: config substitution failed, copying config as-is"
          cp /home/node/.openclaw/openclaw.json /tmp/openclaw-home/.openclaw/openclaw.json
        fi
        # Link extensions directory so plugins are discoverable at runtime HOME
        ln -sfn /home/node/.openclaw/extensions /tmp/openclaw-home/.openclaw/extensions
        # Carry over git identity from the image
        cp /home/node/.gitconfig /tmp/openclaw-home/.gitconfig 2>/dev/null || true
        # Ensure temp home is owned by node
        chown -R 1000:1000 /tmp/openclaw-home

        # --- Phase 3: Drop to node user and start gateway ---
        exec gosu node sh -c '
          export HOME=/tmp/openclaw-home
          git config --global url."https://x-access-token:'"$${GITHUB_TOKEN}"'@github.com/".insteadOf "https://github.com/"
          echo "Starting gateway..."
          exec node /app/openclaw.mjs gateway --allow-unconfigured --bind lan --port 18789
        '
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 60s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 1.5G
          cpus: "1.5"
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  # ==========================================================================
  # Orchestrator — lightweight loop driver that triggers the OpenClaw agent
  # on a configurable interval. It does NOT make decisions — the agent (via
  # SKILL.md) makes all decisions. The orchestrator just sends the prompt,
  # monitors for hangs, collects metrics, and enforces the time budget.
  # ==========================================================================
  orchestrator:
    build:
      context: ./orchestrator
      dockerfile: Dockerfile
    container_name: stilltent-orchestrator
    depends_on:
      openclaw-gateway:
        condition: service_healthy
    environment:
      OPENCLAW_URL: http://openclaw-gateway:18789
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      TARGET_REPO: ${TARGET_REPO}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-qwen/qwen3-coder-next}
      LOOP_INTERVAL: ${LOOP_INTERVAL:-60}
      COOLDOWN_SECONDS: ${COOLDOWN_SECONDS:-30}
      ITERATION_TIMEOUT: ${ITERATION_TIMEOUT:-600}
      MAX_CONSECUTIVE_FAILURES: ${MAX_CONSECUTIVE_FAILURES:-25}
      TOTAL_RUNTIME_HOURS: ${TOTAL_RUNTIME_HOURS:-120}
      BUDGET_LIMIT: ${BUDGET_LIMIT:-50}
      DAILY_BUDGET_LIMIT: ${DAILY_BUDGET_LIMIT:-15}
      MAX_ITERATIONS: ${MAX_ITERATIONS:-0}
      WORKSPACE_DIR: /workspace
    volumes:
      - ./workspace:/workspace:rw
    networks:
      - stilltent-net
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
