# memory-mem9.yml — Self-hosted mem9 memory stack
#
# Includes embed-service (local C-based 256-dim embeddings) and
# mnemo-server (Go memory API backed by TiDB). Both extend the
# stilltent-net network and depend on TiDB being healthy.

services:

  embed-service:
    build:
      context: ./memory/mem9/embed-service
      dockerfile: Dockerfile
    container_name: stilltent-embed
    read_only: true
    tmpfs:
      - /tmp:size=10m
    environment:
      EMBED_PORT: "8090"
      EMBED_DIMS: "256"
      EMBED_THREADS: "2"
    ports:
      - "8090:8090"
    networks:
      stilltent-net:
        aliases:
          - embed
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8090/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 10
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  mnemo-server:
    build:
      context: ./memory/mem9/mnemo-server/server
      dockerfile: Dockerfile
    container_name: stilltent-mnemo
    depends_on:
      tidb:
        condition: service_healthy
      embed-service:
        condition: service_healthy
    environment:
      MNEMO_DSN: "${TIDB_USER:-root}:${TIDB_PASSWORD:-}@tcp(${TIDB_HOST:-tidb}:${TIDB_PORT:-4000})/${TIDB_DATABASE:-mnemos}?parseTime=true"
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-ollama}
      MNEMO_EMBED_BASE_URL: http://embed-service:8090/v1
      MNEMO_EMBED_API_KEY: local
      MNEMO_EMBED_MODEL: ${EMBEDDING_MODEL:-local-embed}
      MNEMO_TIDB_ZERO_ENABLED: "false"
      MNEMO_EMBED_DIMS: ${EMBEDDING_DIM:-256}
      MNEMO_PORT: 8082
    ports:
      - "8082:8082"
    networks:
      - stilltent-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8082/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
