# base.yml — Network, volume, and TiDB (always included)
#
# This fragment is always included in every stilltent compose assembly.
# It defines the shared bridge network, persistent volume, and the TiDB
# database that all memory backends depend on.

networks:
  stilltent-net:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: "1500"

volumes:
  tidb-data:

services:

  tidb:
    image: pingcap/tidb:v8.4.0
    container_name: stilltent-tidb
    volumes:
      - tidb-data:/tmp/tidb
    ports:
      - "4000:4000"
      - "10080:10080"
    networks:
      - stilltent-net
    environment:
      TIDB_CONFIG: |
        [performance]
        max-memory = 2147483648
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:10080/status"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2.5G
          cpus: "1.5"
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
