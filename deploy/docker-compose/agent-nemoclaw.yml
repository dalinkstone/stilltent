# agent-nemoclaw.yml — NemoClaw agent runtime
#
# NemoClaw (github.com/NVIDIA/NemoClaw) wraps OpenClaw with NVIDIA
# OpenShell for sandboxed execution. Policies are mounted read-only
# from config/agents/nemoclaw/policies.

services:

  nemoclaw:
    build:
      context: ./config/agents/nemoclaw
      dockerfile: Dockerfile
    container_name: stilltent-nemoclaw
    depends_on:
      mnemo-server:
        condition: service_healthy
    ports:
      - "18789:18789"
    volumes:
      - ./workspace:/workspace:rw
      - ./config/agents/nemoclaw/policies:/policies:ro
    environment:
      NVIDIA_API_KEY: ${NVIDIA_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-qwen/qwen3-coder-next}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      TARGET_REPO: ${TARGET_REPO}
      AGENT_MEMORY_URL: ${AGENT_MEMORY_URL:-http://mnemo-server:8082}
      WORKSPACE_DIR: /workspace
      LISTEN_PORT: "18789"
    networks:
      - stilltent-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:18789/healthz || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 1.5G
          cpus: "1.5"
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
