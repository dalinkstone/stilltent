# agent-nanoclaw.yml — NanoClaw agent runtime
#
# NanoClaw (github.com/qwibitai/nanoclaw) runs Claude agents in isolated
# Docker containers. Exposes the same HTTP interface contract as OpenClaw
# gateway on port 18789.

services:

  nanoclaw:
    build:
      context: ./config/agents/nanoclaw
      dockerfile: Dockerfile
    container_name: stilltent-nanoclaw
    depends_on:
      mnemo-server:
        condition: service_healthy
    ports:
      - "18789:18789"
    volumes:
      - ./workspace:/workspace:rw
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      TARGET_REPO: ${TARGET_REPO}
      AGENT_MEMORY_URL: ${AGENT_MEMORY_URL:-http://mnemo-server:8082}
      WORKSPACE_DIR: /workspace
      LISTEN_PORT: "18789"
    networks:
      - stilltent-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:18789/healthz || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 1.5G
          cpus: "1.5"
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
