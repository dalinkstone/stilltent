# agent-nanoclaw.yml — NanoClaw lightweight agent overlay
version: "3.8"

services:
  nanoclaw:
    build:
      context: ../../config/agents/nanoclaw
      dockerfile: Dockerfile
    env_file:
      - ../../.env
    depends_on:
      - mnemo-server
    networks:
      - stilltent
    restart: unless-stopped
